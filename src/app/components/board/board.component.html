<div class="board" [class.valid]="validation() === 'valid'" [class.invalid]="validation() === 'invalid'">
  @for (_ of Array(size); track $index; let rowIndex = $index) {
    <div class="row">
      @for (_ of Array(size); track $index; let columnIndex = $index) {
        <app-cell [rowIndex]="rowIndex" [columnIndex]="columnIndex" />
      }
    </div>
  }

  <div class="loading-overlay" [class.visible]="boardLoading()">
    <mat-spinner />
  </div>
</div>
